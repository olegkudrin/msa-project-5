apiVersion: batch/v1
kind: CronJob
metadata:
  name: data-export-cronjob
spec:
  schedule: "0 20 * * *"
  timeZone: "Europe/Moscow"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: data-exporter
              image: data-exporter:latest
              imagePullPolicy: Never
              env:
                - { name: TABLE_NAME, value: shipments }
                - { name: OUTPUT_DIR, value: /data/exports }
                - { name: DB_HOST, value: postgresql }
                - { name: DB_PORT, value: "5432" }
                - { name: DB_NAME, value: logistics }
                - { name: DB_USER, value: postgres }
                - { name: DB_PASSWORD, value: postgres }
              volumeMounts:
                - name: export-data
                  mountPath: /data/exports
          volumes:
            - name: export-data
              persistentVolumeClaim:
                claimName: export-data-pvc
